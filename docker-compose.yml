services:
  imu:
    build: .
    container_name: smart-mfg-imu
    privileged: true
    devices:
      - "/dev/i2c-1:/dev/i2c-1"
      - "/dev/gpiomem:/dev/gpiomem"
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      DEVICE_ID: ${DEVICE_ID:-0}
      AUTO_TARE: ${AUTO_TARE:-false}
    restart: unless-stopped
    command: ["python3", "-m", "imu"]
